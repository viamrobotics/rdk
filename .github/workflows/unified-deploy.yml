name: Unified Deploy

on:
  workflow_call:
    inputs:
      date:
        required: true
        type: string
      release_type:
        required: true
        type: string
        description: "Release type for staticbuild deploy"
      channel:
        required: false
        type: string
        description: "Channel for full-static deploy"
      version:
        required: false
        type: string
        description: "Version string for full-static stable releases"
      include_full_static:
        required: false
        type: boolean
        default: true
    secrets:
      GCP_CREDENTIALS:
        required: true
      SLACK_BOT_TOKEN:
        required: false

jobs:
  appimage:
    uses: viamrobotics/rdk/.github/workflows/appimage-deploy.yml@cm/build-matrix-prototype
    with:
      date: ${{ inputs.date }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  staticbuild:
    uses: viamrobotics/rdk/.github/workflows/staticbuild-deploy.yml@cm/build-matrix-prototype
    with:
      date: ${{ inputs.date }}
      release_type: ${{ inputs.release_type }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  full-static:
    if: inputs.include_full_static
    uses: viamrobotics/rdk/.github/workflows/full-static-deploy.yml@cm/build-matrix-prototype
    with:
      date: ${{ inputs.date }}
      channel: ${{ inputs.channel }}
      version: ${{ inputs.version }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
