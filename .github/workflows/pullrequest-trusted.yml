name: Pull Request Update

concurrency:
  group: pullrequest-${{ github.head_ref }}
  cancel-in-progress: true

on:
  pull_request_target:
    branches: [ main ]
    types: [ labeled ]

# To test workflow updates you need to work in a branch directly on viamrobotics/rdk
# and tag your working branch instead of @main in any viamrobotics/rdk "uses" below.
# Don't forget to tag back to @main before merge.

jobs:
  test:
    if: (github.event.label.name == 'safe to test' || github.event.label.name == 'appimage')
    uses: viamrobotics/rdk/.github/workflows/test.yml@main
    secrets:
      MONGODB_TEST_OUTPUT_URI: ${{ secrets.MONGODB_TEST_OUTPUT_URI }}
      DOCKER_PUBLIC_READONLY_PAT: ${{ secrets.DOCKER_PUBLIC_READONLY_PAT }}

  # This lets people add an "appimage" tag to have appimages built for the PR
  appimage:
    needs: [test]
    if: |
      always() && !cancelled() && contains(github.event.pull_request.labels.*.name, 'safe to test') &&
      !contains(github.event.pull_request.labels.*.name, 'appimage-ignore-tests') &&
      contains(github.event.pull_request.labels.*.name, 'appimage') && needs.test.result == 'success'
    uses: viamrobotics/rdk/.github/workflows/appimage-build.yml@main
    with:
      release_type: 'pr'
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  appimage-ignore-tests:
    if: |
       always() && !cancelled() && contains(github.event.pull_request.labels.*.name, 'safe to test') &&
       contains(github.event.pull_request.labels.*.name, 'appimage-ignore-tests')
    uses: viamrobotics/rdk/.github/workflows/appimage-build.yml@main
    with:
      release_type: 'pr'
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  # This lets people add a "static-build" tag to have static binaries built for the PR
  static:
    needs: [test]
    if: |
      always() && !cancelled() && contains(github.event.pull_request.labels.*.name, 'safe to test') &&
      !contains(github.event.pull_request.labels.*.name, 'static-ignore-tests') &&
      contains(github.event.pull_request.labels.*.name, 'static-build') && needs.test.result == 'success'
    uses: viamrobotics/rdk/.github/workflows/staticbuild-build.yml@main
    with:
      release_type: 'pr'
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  static-ignore-tests:
    if: |
       always() && !cancelled() && contains(github.event.pull_request.labels.*.name, 'safe to test') &&
       contains(github.event.pull_request.labels.*.name, 'static-ignore-tests')
    uses: viamrobotics/rdk/.github/workflows/staticbuild-build.yml@main
    with:
      release_type: 'pr'
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  # Mirrors the dev-release comment flow in viamrobotics/agent: post (and keep
  # updating in place) a sticky PR comment linking to the AppImages built above.
  appimage-comment:
    needs: [appimage, appimage-ignore-tests]
    if: |
      always() && !cancelled() &&
      (needs.appimage.result == 'success' || needs.appimage-ignore-tests.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Post or update sticky PR comment
        # marocchino/sticky-pull-request-comment@v3.0.4
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
        with:
          GITHUB_TOKEN: ${{ secrets.PR_TOKEN }}
          header: appimage-build-urls
          number: ${{ github.event.pull_request.number }}
          message: |
            ### Built AppImages for pr-${{ github.event.pull_request.number }}

            - arm64: https://storage.googleapis.com/packages.viam.com/apps/viam-server/viam-server-pr-${{ github.event.pull_request.number }}-aarch64.AppImage
            - x86_64: https://storage.googleapis.com/packages.viam.com/apps/viam-server/viam-server-pr-${{ github.event.pull_request.number }}-x86_64.AppImage

  # Mirrors the dev-release comment flow in viamrobotics/agent: post (and keep
  # updating in place) a sticky PR comment linking to the static binaries built
  # above. Authenticated with PR_TOKEN because pull_request_target's default
  # GITHUB_TOKEN is not used for PR writes in this repo (see pr-labeler.yml).
  static-comment:
    needs: [static, static-ignore-tests]
    if: |
      always() && !cancelled() &&
      (needs.static.result == 'success' || needs.static-ignore-tests.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Post or update sticky PR comment
        # marocchino/sticky-pull-request-comment@v3.0.4
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
        with:
          GITHUB_TOKEN: ${{ secrets.PR_TOKEN }}
          header: static-build-urls
          number: ${{ github.event.pull_request.number }}
          message: |
            ### Built Static Binaries for pr-${{ github.event.pull_request.number }}

            - arm64: https://storage.googleapis.com/packages.viam.com/apps/viam-server/viam-server-pr-${{ github.event.pull_request.number }}-aarch64
            - x86_64: https://storage.googleapis.com/packages.viam.com/apps/viam-server/viam-server-pr-${{ github.event.pull_request.number }}-x86_64
            - windows x86_64: https://storage.googleapis.com/packages.viam.com/apps/viam-server/viam-server-pr-${{ github.event.pull_request.number }}-windows-x86_64
            - macOS arm64: https://storage.googleapis.com/packages.viam.com/apps/viam-server/viam-server-pr-${{ github.event.pull_request.number }}-darwin-aarch64

  droid:
    needs: test
    uses: viamrobotics/rdk/.github/workflows/droid.yml@main
    with:
      release_type: 'pr'
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  license_finder:
    uses: viamrobotics/rdk/.github/workflows/license_finder.yml@main

  cli:
    uses: viamrobotics/rdk/.github/workflows/cli.yml@main
    with:
      release_type: pr
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
