name: Build AppImage (Build)

on:
  workflow_dispatch:
    inputs:
      release_type:
        required: true
        type: string
        default: latest
  workflow_call:
    inputs:
      release_type:
        required: true
        type: string
    secrets:
      GCP_CREDENTIALS:
        required: true
      # PAT used to post the PR download-links comment. Only passed by the PR
      # caller (pullrequest-trusted.yml); release callers omit it and the
      # comment job below is skipped for them.
      PR_TOKEN:
        required: false
    outputs:
      date:
        value: ${{ jobs.appimage.outputs.date }}
      channel:
        value: ${{ jobs.appimage.outputs.channel }}

jobs:
  appimage:
    name: AppImage Build
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ubuntu-latest
            image: ghcr.io/viamrobotics/rdk-devenv:amd64-cache
            platform: linux/amd64
            label: amd64
          - arch: ubuntu-small-arm
            image: ghcr.io/viamrobotics/rdk-devenv:arm64-cache
            platform: linux/arm64
            label: arm64
    runs-on: ${{ matrix.arch }}
    container:
      image: ${{ matrix.image }}
      options: --platform ${{ matrix.platform }}
    timeout-minutes: 15
    outputs:
      date: ${{ steps.build_date.outputs.date }}
      channel: ${{ steps.build_date.outputs.channel }}

    steps:
    - name: Check out code
      if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
      uses: actions/checkout@v4

    - name: Check out PR branch code
      if: github.event_name == 'pull_request_target'
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Clean and Fix Permissions
      run: |
        chown testbot:testbot -R .
        sudo -Hu testbot bash -lc 'make clean-all'

    - name: Authorize GCP Upload
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Build and Package (Test)
      if: github.event_name == 'workflow_dispatch' && inputs.release_type == 'pr'
      run: |
        sudo -Hu testbot bash -lc 'make BUILD_CHANNEL="test-$(git rev-parse --short HEAD)" appimage'

    - name: Build and Package (PR)
      if: contains(github.event.pull_request.labels.*.name, 'appimage') || contains(github.event.pull_request.labels.*.name, 'appimage-ignore-tests')
      run: |
        sudo -Hu testbot bash -lc 'make BUILD_CHANNEL="pr-${{ github.event.pull_request.number }}" appimage'

    - name: Upload Files (PR)
      if: contains(github.event.pull_request.labels.*.name, 'appimage') || contains(github.event.pull_request.labels.*.name, 'appimage-ignore-tests')
      uses: google-github-actions/upload-cloud-storage@v0.10.4
      with:
        headers: "cache-control: no-cache"
        path: 'etc/packaging/appimages/deploy/'
        destination: 'packages.viam.com/apps/viam-server/'
        glob: '*'
        parent: false
        gzip: false

    - name: Build and Package (Latest)
      if: inputs.release_type == 'latest'
      run: |
        sudo -Hu testbot bash -lc 'make BUILD_CHANNEL="latest" appimage'

    - name: Build and Package (Tagged)
      if: inputs.release_type == 'stable' || inputs.release_type == 'rc'
      run: |
        sudo -Hu testbot bash -lc 'make RELEASE_TYPE="${{ inputs.release_type }}" BUILD_CHANNEL="${{ github.ref_name }}" appimage'

    - name: Set Date and Channel
      id: build_date
      run: |
        echo "date=`date +%F`" >> $GITHUB_OUTPUT
        # extract channel from built AppImage filename for use by smoke tests
        f=$(ls etc/packaging/appimages/deploy/*.AppImage | head -1)
        echo "channel=$(basename "$f" | sed 's/^viam-server-//;s/-[^-]*\.AppImage$//')" >> $GITHUB_OUTPUT

    - name: Upload Files (Testing)
      if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
      uses: google-github-actions/upload-cloud-storage@v0.10.4
      with:
        headers: "cache-control: no-cache"
        path: 'etc/packaging/appimages/deploy/'
        destination: 'packages.viam.com/apps/viam-server/testing/appimage/${{ steps.build_date.outputs.date }}/${{ github.sha }}/'
        glob: '*'
        parent: false
        gzip: false

  appimage_test:
    name: AppImage Test
    needs: appimage
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        arch: [[ubuntu-latest], [ubuntu-small-arm], [pi4], [pi5]]
    runs-on: ${{ matrix.arch }}
    timeout-minutes: 15

    steps:
    - name: Clean Workspace
      run: |
        shopt -s dotglob
        sudo chown -R `whoami` ./
        rm -rf ./*

    - name: Test AppImage
      run: |
        if echo "${{ matrix.arch[0] }}" | grep -q 'ubuntu'; then
          sudo apt-get install -y libfuse2
        fi
        export TEST_DIR=`mktemp -d -t test-viam-server-XXXXXX`
        cd $TEST_DIR

        curl -o viam-server https://storage.googleapis.com/packages.viam.com/apps/viam-server/testing/appimage/${{ needs.appimage.outputs.date }}/${{ github.sha }}/viam-server-${{ needs.appimage.outputs.channel }}-`uname -m`.AppImage
        chmod 755 viam-server

        export RAND_PORT=$((30000 + $RANDOM))
        echo "{\"network\": {\"bind_address\":\"localhost:${RAND_PORT}\"}}" > test.json

        ./viam-server -config test.json &
        curl --retry 5 --retry-delay 5 --retry-connrefused localhost:$RAND_PORT
        export RET1=$?
        kill %%
        wait $!
        export RET2=$?
        cd - && rm -rf $TEST_DIR
        [ $RET1 == 0 ] && [ $RET1 == 0 ]

  # Mirrors the dev-release comment flow in viamrobotics/agent: post (and keep
  # updating in place) a sticky PR comment linking to the AppImages built above.
  # Lives here (not in the pull_request_target caller) so it can be tested from
  # a PR by pinning the caller's `uses:` ref to the working branch.
  comment:
    name: Output Summary
    runs-on: ubuntu-latest
    needs: appimage
    if: contains(github.event.pull_request.labels.*.name, 'appimage') || contains(github.event.pull_request.labels.*.name, 'appimage-ignore-tests')
    steps:
    - name: Post or update sticky PR comment
      # marocchino/sticky-pull-request-comment@v3.0.4
      uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0
      with:
        GITHUB_TOKEN: ${{ secrets.PR_TOKEN }}
        header: appimage-build-urls
        number: ${{ github.event.pull_request.number }}
        message: |
          ### Built AppImages for pr-${{ github.event.pull_request.number }}

          - arm64: https://storage.googleapis.com/packages.viam.com/apps/viam-server/viam-server-pr-${{ github.event.pull_request.number }}-aarch64.AppImage
          - x86_64: https://storage.googleapis.com/packages.viam.com/apps/viam-server/viam-server-pr-${{ github.event.pull_request.number }}-x86_64.AppImage
