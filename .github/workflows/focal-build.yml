name: Focal Static Build

# Builds, boots, and (per release_type) publishes a viam-server-focal channel
# on the rdk-focal image. Called by pullrequest-trusted.yml for labeled PRs
# (release_type: pr -> focal-pr-<number>); schedule and default dispatch validate only.
# No concurrency block: github.ref is the base ref for every PR here, so a
# shared group would cancel unrelated builds. The parent handles PR concurrency.

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "'focal' publishes the shared channel; 'validate' builds and boots only"
        required: true
        default: validate
        type: choice
        options: [validate, focal]
  schedule:
    - cron: '0 8 * * *' # daily, after docker.yml (6AM UTC) republishes the image
  workflow_call:
    inputs:
      release_type:
        required: true
        type: string
    secrets:
      GCP_CREDENTIALS:
        required: true

permissions:
  contents: read

jobs:
  focal-static:
    name: Focal Static Build and Boot
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ubuntu-large
            image: ghcr.io/viamrobotics/rdk-focal:amd64-cache
            platform: linux/amd64
            uname_m: x86_64
          - arch: ubuntu-large-arm
            image: ghcr.io/viamrobotics/rdk-focal:arm64-cache
            platform: linux/arm64
            uname_m: aarch64
    runs-on: ${{ matrix.arch }}
    container:
      image: ${{ matrix.image }}
      options: --platform ${{ matrix.platform }}
    timeout-minutes: 30

    steps:
    - name: Check out code
      if: github.event_name != 'pull_request_target'
      # actions/checkout@v7.0.0
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0 # needed for dev-version.sh to work

    - name: Check out PR branch code
      if: github.event_name == 'pull_request_target'
      # actions/checkout@v7.0.0
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Fix permissions
      run: chown -R testbot:testbot .

    - name: Install upx
      # crazy-max/ghaction-upx@v4.0.0
      uses: crazy-max/ghaction-upx@c83f378efc804f828e988debb88ed6116feb2368
      with:
        version: v5.2.0
        install-only: true

    - name: Link upx into /usr/local/bin
      run: ln -sf "$(command -v upx)" /usr/local/bin/upx

    - name: Resolve channel
      id: meta
      uses: ./.github/actions/focal-channel
      with:
        release-type: ${{ inputs.release_type }}

    - name: Build viam-server-${{ steps.meta.outputs.channel }}
      run: |
        sudo -Hu testbot bash -lc 'make BUILD_CHANNEL=${{ steps.meta.outputs.channel }} UNAME_M=${{ matrix.uname_m }} VERSION_SUFFIX=+focal static-release'

    - name: Boot smoke test
      run: |
        sudo -Hu testbot bash -lc '
          set -euo pipefail
          bin=$(find etc/packaging/static/deploy -type f -name "viam-server-*" | head -1)
          port=$((30000 + RANDOM))
          echo "{\"network\":{\"bind_address\":\"localhost:${port}\"}}" > /tmp/smoke.json
          "$bin" -config /tmp/smoke.json &
          srv=$!
          curl --retry 8 --retry-delay 2 --retry-connrefused -s "localhost:${port}" >/dev/null
          echo "boot OK"
          kill $srv 2>/dev/null || true
          wait $srv 2>/dev/null || true
        '

    - name: Publish ${{ steps.meta.outputs.channel }} channel
      if: steps.meta.outputs.publish == 'true'
      uses: ./.github/actions/focal-publish
      with:
        channel: ${{ steps.meta.outputs.channel }}
        arch: ${{ matrix.uname_m }}
        gcp-credentials: ${{ secrets.GCP_CREDENTIALS }}

  # Bare arm64 host + docker run: JS actions can't exec in a 32-bit-arm container.
  focal-static-armhf:
    name: Focal Static Build and Boot (armhf)
    runs-on: ubuntu-large-arm
    timeout-minutes: 30

    steps:
    - name: Clean workspace
      run: |
        shopt -s dotglob
        sudo chown -R "$(whoami)" ./ || true
        rm -rf ./* || true

    - name: Check out code
      if: github.event_name != 'pull_request_target'
      # actions/checkout@v7.0.0
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        fetch-depth: 0

    - name: Check out PR branch code
      if: github.event_name == 'pull_request_target'
      # actions/checkout@v7.0.0
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      with:
        ref: ${{ github.event.pull_request.head.sha }}

    - name: Resolve channel
      id: meta
      uses: ./.github/actions/focal-channel
      with:
        release-type: ${{ inputs.release_type }}

    # Register binfmt so the arm64 host can run the linux/arm/v7 container.
    - name: Set up QEMU
      # docker/setup-qemu-action@v4.2.0
      uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

    - name: Build and boot in armhf container
      run: |
        chmod -R a+rwX .
        docker run --platform linux/arm/v7 \
          -e BUILD_CHANNEL='${{ steps.meta.outputs.channel }}' \
          -v "$(pwd)":/rdk \
          ghcr.io/viamrobotics/rdk-focal:armhf-cache \
          bash /rdk/etc/focal-armhf-build.sh

    - name: Publish ${{ steps.meta.outputs.channel }} channel
      if: steps.meta.outputs.publish == 'true'
      uses: ./.github/actions/focal-publish
      with:
        channel: ${{ steps.meta.outputs.channel }}
        arch: armv7l
        gcp-credentials: ${{ secrets.GCP_CREDENTIALS }}
