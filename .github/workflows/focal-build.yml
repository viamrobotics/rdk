name: Focal Static Build

# Non-gating: builds, boots, and uploads viam-server-focal on the rdk-focal image.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *' # daily, after docker.yml (6AM UTC) republishes the image
  pull_request:
    types: [opened, reopened, synchronize, labeled]

permissions:
  contents: read

jobs:
  focal-static:
    name: Focal Static Build and Boot
    # On PRs, only run when explicitly opted in via the `focal-build` label.
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'focal-build')
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: ubuntu-large
            image: ghcr.io/viamrobotics/rdk-focal:amd64-cache
            platform: linux/amd64
          - arch: ubuntu-large-arm
            image: ghcr.io/viamrobotics/rdk-focal:arm64-cache
            platform: linux/arm64
    runs-on: ${{ matrix.arch }}
    container:
      image: ${{ matrix.image }}
      options: --platform ${{ matrix.platform }}
    timeout-minutes: 30

    steps:
    - name: Check out code
      # actions/checkout@v4.3.1
      uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Fix permissions
      run: chown -R testbot:testbot .

    - name: Build viam-server-static on Focal
      # Fake the frontend (no Node in this image) so the embed compiles.
      run: |
        sudo -Hu testbot bash -lc '
          mkdir -p web/runtime-shared/static && touch web/runtime-shared/static/control.js
          make server-static
        '

    - name: Verify Focal binary floor
      # Must depend on nothing newer than Focal (GLIBC 2.31).
      run: |
        sudo -Hu testbot bash -lc '
          set -euo pipefail
          bin=$(ls bin/*/viam-server-static | head -1)
          echo "Inspecting $bin"; file "$bin"; ldd "$bin" || true
          max_glibc=$(objdump -T "$bin" | grep -oE "GLIBC_[0-9.]+" | sort -V | tail -1)
          echo "max GLIBC: ${max_glibc:-none}"
          objdump -T "$bin" | grep -oE "GLIBCXX_[0-9.]+" | sort -V | tail -1 || echo "no GLIBCXX dep (static libstdc++)"
        '

    - name: Boot smoke test
      run: |
        sudo -Hu testbot bash -lc '
          set -euo pipefail
          bin=$(ls bin/*/viam-server-static | head -1)
          port=$((30000 + RANDOM))
          echo "{\"network\":{\"bind_address\":\"localhost:${port}\"}}" > /tmp/smoke.json
          "$bin" -config /tmp/smoke.json &
          srv=$!
          curl --retry 8 --retry-delay 2 --retry-connrefused -sf "localhost:${port}" >/dev/null
          echo "boot OK"
          kill $srv 2>/dev/null || true
          wait $srv 2>/dev/null || true
        '

    - name: Stage artifact
      id: meta
      run: |
        arch=$(uname -m)
        mkdir -p focal-deploy
        bin=$(find bin -type f -name viam-server-static | head -1)
        cp "$bin" "focal-deploy/viam-server-focal-${arch}"
        echo "arch=${arch}" >> "$GITHUB_OUTPUT"
        echo "date=$(date +%F)" >> "$GITHUB_OUTPUT"

    # Upload only from this repo (fork PRs have no GCS credentials).
    - name: Authorize GCP upload
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      # google-github-actions/auth@v2.1.13
      uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed
      with:
        credentials_json: ${{ secrets.GCP_CREDENTIALS }}

    - name: Upload viam-server-focal
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      # google-github-actions/upload-cloud-storage@v2.2.4
      uses: google-github-actions/upload-cloud-storage@c0f6160ff80057923ff50e5e567695cea181ec23
      with:
        headers: "cache-control: no-cache"
        path: focal-deploy/
        destination: packages.viam.com/apps/viam-server/testing/focal/${{ steps.meta.outputs.date }}/${{ github.sha }}/
        glob: 'viam-server-focal-*'
        parent: false

    - name: Summary
      if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
      run: |
        url="https://storage.googleapis.com/packages.viam.com/apps/viam-server/testing/focal/${{ steps.meta.outputs.date }}/${{ github.sha }}/viam-server-focal-${{ steps.meta.outputs.arch }}"
        echo "### Focal viam-server (${{ steps.meta.outputs.arch }})" >> "$GITHUB_STEP_SUMMARY"
        echo "$url" >> "$GITHUB_STEP_SUMMARY"
