name: Deploy Dispatcher

on:
  workflow_call:
    inputs:
      type:
        required: true
        type: string
        description: "Deploy type: appimage, staticbuild, or full-static"
      date:
        required: true
        type: string
      release_type:
        required: false
        type: string
        description: "Release type (staticbuild)"
      channel:
        required: false
        type: string
        description: "Channel for file naming (full-static)"
      version:
        required: false
        type: string
        description: "Version string (full-static stable)"
    secrets:
      GCP_CREDENTIALS:
        required: true
      SLACK_BOT_TOKEN:
        required: false

jobs:
  appimage:
    if: inputs.type == 'appimage'
    uses: viamrobotics/rdk/.github/workflows/appimage-deploy.yml@cm/build-matrix-prototype
    with:
      date: ${{ inputs.date }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  staticbuild:
    if: inputs.type == 'staticbuild'
    uses: viamrobotics/rdk/.github/workflows/staticbuild-deploy.yml@cm/build-matrix-prototype
    with:
      date: ${{ inputs.date }}
      release_type: ${{ inputs.release_type }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  full-static:
    if: inputs.type == 'full-static'
    uses: viamrobotics/rdk/.github/workflows/full-static-deploy.yml@cm/build-matrix-prototype
    with:
      date: ${{ inputs.date }}
      channel: ${{ inputs.channel }}
      version: ${{ inputs.version }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
