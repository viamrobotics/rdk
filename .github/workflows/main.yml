name: Build and Publish Latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (use "pr" for safe testing, "latest" to publish)'
        type: choice
        options: [pr, latest]
        default: pr
      no-upload:
        description: 'Skip GCS uploads in build jobs'
        type: boolean
        default: true
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'

# To test workflow updates you need to work in a branch directly on viamrobotics/rdk
# and tag your working branch instead of @main in any viamrobotics/rdk "uses" below.
# Don't forget to tag back to @main before merge.

jobs:
  test:
    uses: viamrobotics/rdk/.github/workflows/test.yml@APP-14315
    secrets:
      MONGODB_TEST_OUTPUT_URI: ${{ secrets.MONGODB_TEST_OUTPUT_URI }}
      DOCKER_PUBLIC_READONLY_PAT: ${{ secrets.DOCKER_PUBLIC_READONLY_PAT }}

  appimage-build:
    uses: viamrobotics/rdk/.github/workflows/appimage-build.yml@APP-14315
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  appimage-deploy:
    if: ${{ inputs.release_type != 'pr' }}
    needs: [test, appimage-build]
    uses: viamrobotics/rdk/.github/workflows/appimage-deploy.yml@APP-14315
    with:
      date: ${{ needs.appimage-build.outputs.date }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  staticbuild-build:
    uses: viamrobotics/rdk/.github/workflows/staticbuild-build.yml@APP-14315
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
      no-upload: ${{ inputs.no-upload || false }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  staticbuild-deploy:
    if: ${{ inputs.release_type != 'pr' }}
    needs: [test, staticbuild-build]
    uses: viamrobotics/rdk/.github/workflows/staticbuild-deploy.yml@APP-14315
    with:
      date: ${{ needs.staticbuild-build.outputs.date }}
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  full-static-build:
    uses: viamrobotics/rdk/.github/workflows/full-static-build.yml@APP-14315
    with:
      channel: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  full-static-deploy:
    if: ${{ inputs.release_type != 'pr' }}
    needs: [test, full-static-build]
    uses: viamrobotics/rdk/.github/workflows/full-static-deploy.yml@APP-14315
    with:
      date: ${{ needs.full-static-build.outputs.date }}
      channel: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  droid:
    needs: test
    uses: viamrobotics/rdk/.github/workflows/droid.yml@APP-14315
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  cli:
    uses: viamrobotics/rdk/.github/workflows/cli.yml@APP-14315
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  license_finder:
    uses: viamrobotics/rdk/.github/workflows/license_finder.yml@APP-14315

  slack-workflow-status:
    if: ${{ !success() && inputs.release_type != 'pr' }}
    name: Post Workflow Status To Slack
    needs:
      - test
      - appimage-deploy
      - staticbuild-deploy
    runs-on: ubuntu-latest
    permissions:
      actions: 'read'
    steps:
      - name: Slack Workflow Notification
        uses: Gamesight/slack-workflow-status@master
        with:
          repo_token: ${{secrets.GITHUB_TOKEN}}
          slack_webhook_url: ${{secrets.SLACK_WEBHOOK_URL}}
          channel: '#team-devops'
          name: 'Workflow Status'
