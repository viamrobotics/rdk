name: Build and Publish Latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (use "pr" for safe testing, "latest" to publish)'
        type: choice
        options: [pr, latest]
        default: pr
      no_prod_upload:
        description: 'Skip production deploy (build and stage only)'
        type: boolean
        default: true
      full_test:
        description: 'Run full test suite (disable skip logic)'
        type: boolean
        default: false
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'

# To test workflow updates you need to work in a branch directly on viamrobotics/rdk
# and tag your working branch instead of @main in any viamrobotics/rdk "uses" below.
# Don't forget to tag back to @main before merge.

jobs:
  test:
    uses: viamrobotics/rdk/.github/workflows/test.yml@cm/build-matrix-prototype
    with:
      full_test: ${{ inputs.full_test || false }}
    secrets:
      MONGODB_TEST_OUTPUT_URI: ${{ secrets.MONGODB_TEST_OUTPUT_URI }}
      DOCKER_PUBLIC_READONLY_PAT: ${{ secrets.DOCKER_PUBLIC_READONLY_PAT }}

  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: appimage
            release_type: ${{ inputs.release_type || 'latest' }}
          - type: staticbuild
            release_type: ${{ inputs.release_type || 'latest' }}
          - type: full-static
            channel: ${{ inputs.release_type || 'latest' }}
    uses: viamrobotics/rdk/.github/workflows/build-dispatcher.yml@cm/build-matrix-prototype
    with:
      type: ${{ matrix.type }}
      release_type: ${{ matrix.release_type }}
      channel: ${{ matrix.channel }}
      version: ${{ matrix.version }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  deploy:
    if: ${{ inputs.release_type != 'pr' && !inputs.no_prod_upload }}
    needs: [test, build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - type: appimage
          - type: staticbuild
            release_type: ${{ inputs.release_type || 'latest' }}
          - type: full-static
            channel: ${{ inputs.release_type || 'latest' }}
    uses: viamrobotics/rdk/.github/workflows/deploy-dispatcher.yml@cm/build-matrix-prototype
    with:
      type: ${{ matrix.type }}
      date: ${{ needs.build.outputs.date }}
      release_type: ${{ matrix.release_type }}
      channel: ${{ matrix.channel }}
      version: ${{ matrix.version }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  droid:
    needs: test
    uses: viamrobotics/rdk/.github/workflows/droid.yml@cm/build-matrix-prototype
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  cli:
    uses: viamrobotics/rdk/.github/workflows/cli.yml@cm/build-matrix-prototype
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  license_finder:
    uses: viamrobotics/rdk/.github/workflows/license_finder.yml@cm/build-matrix-prototype

  slack-workflow-status:
    if: ${{ !success() && inputs.release_type != 'pr' && !inputs.no_prod_upload }}
    name: Post Workflow Status To Slack
    needs:
      - test
      - deploy
    runs-on: ubuntu-latest
    permissions:
      actions: 'read'
    steps:
      - name: Slack Workflow Notification
        uses: Gamesight/slack-workflow-status@master
        with:
          repo_token: ${{secrets.GITHUB_TOKEN}}
          slack_webhook_url: ${{secrets.SLACK_WEBHOOK_URL}}
          channel: '#team-devops'
          name: 'Workflow Status'
