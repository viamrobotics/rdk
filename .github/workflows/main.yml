name: Build and Publish Latest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type (use "pr" for safe testing, "latest" to publish)'
        type: choice
        options: [pr, latest]
        default: pr
      no_prod_upload:
        description: 'Skip production deploy (build and stage only)'
        type: boolean
        default: true
      full_test:
        description: 'Run full test suite (disable skip logic)'
        type: boolean
        default: false
  push:
    branches: [ main ]
    paths-ignore:
      - 'README.md'

# To test workflow updates you need to work in a branch directly on viamrobotics/rdk
# and tag your working branch instead of @main in any viamrobotics/rdk "uses" below.
# Don't forget to tag back to @main before merge.

jobs:
  # Skip the dev/latest release for pushes that only touch non-release workflow YAML.
  # Release still runs for any non-workflow change or edits to the build/deploy workflows.
  changes:
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.decide.outputs.release }}
    steps:
      # paths-filter needs the git history to diff against the previous commit on push events.
      # actions/checkout@v5.0.1
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
      # dorny/paths-filter@v4.0.1
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d
        id: filter
        with:
          filters: |
            non_workflow:
              - '!.github/workflows/**'
            release_workflow:
              - '.github/workflows/main.yml'
              - '.github/workflows/*-build.yml'
              - '.github/workflows/*-deploy.yml'
              - '.github/workflows/droid.yml'
              - '.github/workflows/cli.yml'
      - id: decide
        env:
          NON_WORKFLOW: ${{ steps.filter.outputs.non_workflow }}
          RELEASE_WORKFLOW: ${{ steps.filter.outputs.release_workflow }}
        run: |
          if [ "$NON_WORKFLOW" = "true" ] || [ "$RELEASE_WORKFLOW" = "true" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    uses: viamrobotics/rdk/.github/workflows/test.yml@main
    with:
      full_test: ${{ inputs.full_test || false }}
    secrets:
      MONGODB_TEST_OUTPUT_URI: ${{ secrets.MONGODB_TEST_OUTPUT_URI }}
      DOCKER_PUBLIC_READONLY_PAT: ${{ secrets.DOCKER_PUBLIC_READONLY_PAT }}

  staticbuild-build:
    needs: changes
    if: ${{ github.event_name != 'push' || needs.changes.outputs.release == 'true' }}
    uses: viamrobotics/rdk/.github/workflows/staticbuild-build.yml@main
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  staticbuild-deploy:
    if: ${{ inputs.release_type != 'pr' && !inputs.no_prod_upload }}
    needs: [test, staticbuild-build]
    uses: viamrobotics/rdk/.github/workflows/staticbuild-deploy.yml@main
    with:
      date: ${{ needs.staticbuild-build.outputs.date }}
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}

  # "focal" is not an official release channel — just a dummy channel name used
  # as the binary filename to unblock testing. Published on merge to main (same
  # gate as the deploy jobs); PRs and staged/no-prod dispatches validate only.
  focal-build:
    needs: [changes, test]
    if: ${{ github.event_name != 'push' || needs.changes.outputs.release == 'true' }}
    uses: viamrobotics/rdk/.github/workflows/focal-build.yml@main
    with:
      release_type: ${{ (inputs.release_type != 'pr' && !inputs.no_prod_upload) && 'focal' || 'validate' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  full-static-build:
    needs: changes
    if: ${{ github.event_name != 'push' || needs.changes.outputs.release == 'true' }}
    uses: viamrobotics/rdk/.github/workflows/full-static-build.yml@main
    with:
      channel: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  full-static-deploy:
    if: ${{ inputs.release_type != 'pr' && !inputs.no_prod_upload }}
    needs: [test, full-static-build]
    uses: viamrobotics/rdk/.github/workflows/full-static-deploy.yml@main
    with:
      date: ${{ needs.full-static-build.outputs.date }}
      channel: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  droid:
    needs: [test, changes]
    if: ${{ github.event_name != 'push' || needs.changes.outputs.release == 'true' }}
    uses: viamrobotics/rdk/.github/workflows/droid.yml@main
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  cli:
    needs: changes
    if: ${{ github.event_name != 'push' || needs.changes.outputs.release == 'true' }}
    uses: viamrobotics/rdk/.github/workflows/cli.yml@main
    with:
      release_type: ${{ inputs.release_type || 'latest' }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  license_finder:
    uses: viamrobotics/rdk/.github/workflows/license_finder.yml@main

  slack-workflow-status:
    if: ${{ !success() && inputs.release_type != 'pr' && !inputs.no_prod_upload }}
    name: Post Workflow Status To Slack
    needs:
      - test
      - staticbuild-deploy
    runs-on: ubuntu-latest
    permissions:
      actions: 'read'
    steps:
      - name: Slack Workflow Notification
        uses: Gamesight/slack-workflow-status@master
        with:
          repo_token: ${{secrets.GITHUB_TOKEN}}
          slack_webhook_url: ${{secrets.SLACK_WEBHOOK_URL}}
          channel: '#team-devops'
          name: 'Workflow Status'
