name: Unified Build

on:
  workflow_call:
    inputs:
      release_type:
        required: true
        type: string
        description: "Release type for appimage and staticbuild (pr, latest, stable, rc)"
      channel:
        required: false
        type: string
        description: "Channel for full-static file naming"
      version:
        required: false
        type: string
        description: "Version string for full-static stable releases"
      include_full_static:
        required: false
        type: boolean
        default: true
    secrets:
      GCP_CREDENTIALS:
        required: true
    outputs:
      date:
        value: ${{ jobs.appimage.outputs.date }}

jobs:
  appimage:
    uses: viamrobotics/rdk/.github/workflows/appimage-build.yml@cm/build-matrix-prototype
    with:
      release_type: ${{ inputs.release_type }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  staticbuild:
    uses: viamrobotics/rdk/.github/workflows/staticbuild-build.yml@cm/build-matrix-prototype
    with:
      release_type: ${{ inputs.release_type }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}

  full-static:
    if: inputs.include_full_static
    uses: viamrobotics/rdk/.github/workflows/full-static-build.yml@cm/build-matrix-prototype
    with:
      channel: ${{ inputs.channel }}
      version: ${{ inputs.version }}
    secrets:
      GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
