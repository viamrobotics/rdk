        //  To use it with matplotlib, pass cmap=ListedColormap(turbo_colormap_data) as an arg to imshow() (don't forget "from matplotlib.colors import ListedColormap").
        //  If you have a typical 8-bit greyscale image, you can use the 8-bit value to index into this LUT directly.

        interpolateTurbo = (colormap, x) => {
            x = Math.max(0.0, Math.min(1.0, x))
            a = Math.floor(x*255.0)
            b = Math.min(255, a + 1)
            f = x*255.0 - a
            return [colormap[a][0] + (colormap[b][0] - colormap[a][0]) * f,
                    colormap[a][1] + (colormap[b][1] - colormap[a][1]) * f,
                    colormap[a][2] + (colormap[b][2] - colormap[a][2]) * f]
        }

        enforceBounds = x => Math.max(0, Math.min(255, x))

        interpolateJet = (colormap, x) => {
            var i = 1;
            while (colormap[i][0] < x) {
                i = i+1;
            }
            i = i-1;

            var width = Math.abs(colormap[i][0] - colormap[i+1][0]);
            var scaling_factor = (x - colormap[i][0]) / width;

            // Get the new color values though interpolation
            var r = colormap[i][1][0] + scaling_factor * (colormap[i+1][1][0] - colormap[i][1][0])
            var g = colormap[i][1][1] + scaling_factor * (colormap[i+1][1][1] - colormap[i][1][1])
            var b = colormap[i][1][2] + scaling_factor * (colormap[i+1][1][2] - colormap[i][1][2])

            return [enforceBounds(r), enforceBounds(g), enforceBounds(b)];

            }
